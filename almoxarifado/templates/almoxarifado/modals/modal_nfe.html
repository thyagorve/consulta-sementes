{# templates/almoxarifado/modals/modal_nfe.html #}

<style>
/* CSS do Modal NFE */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(3px);
    z-index: 1200;
    display: none;
}
.modal-overlay.active {
    display: block;
}
.modal-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    background: white;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    z-index: 1201;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalSlideIn 0.3s ease;
}
@keyframes modalSlideIn {
    from { opacity: 0; transform: translate(-50%, -48%); }
    to { opacity: 1; transform: translate(-50%, -50%); }
}
.modal-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border, #e5e7eb);
}
.modal-header-info {
    background: linear-gradient(135deg, #059669, #10b981);
    color: white;
}
.modal-header-icon {
    width: 48px;
    height: 48px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
}
.modal-header-title {
    flex: 1;
}
.modal-header-title h3 {
    margin: 0;
    font-size: 1.2rem;
    font-weight: 600;
}
.modal-header-title p {
    margin: 4px 0 0;
    font-size: 0.8rem;
    opacity: 0.8;
}
.modal-close {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: #666;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.modal-close:hover {
    background: rgba(0, 0, 0, 0.1);
}
.modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
}
.modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border, #e5e7eb);
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    background: white;
}
.nfe-info-card {
    background: #f0fdf4;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid #d1fae5;
}
.nfe-info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #d1fae5;
}
.nfe-info-row:last-child {
    border-bottom: none;
}
.nfe-info-label {
    font-weight: 600;
    color: #065f46;
}
.itens-lista {
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid var(--border, #e5e7eb);
    border-radius: 12px;
}
.item-nfe-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border-bottom: 1px solid #f1f5f9;
}
.item-nfe-row:hover {
    background: #f8fafc;
}
.item-nfe-codigo {
    font-family: monospace;
    font-size: 0.8rem;
    color: #059669;
    background: rgba(5, 150, 105, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
}
.item-nfe-nome {
    flex: 1;
    font-size: 0.85rem;
    font-weight: 500;
    margin-left: 12px;
}
.item-nfe-qtd {
    font-size: 0.85rem;
    font-weight: 600;
    color: #059669;
    margin-right: 16px;
}
.alert-warning {
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 0.85rem;
}
.loading-spinner {
    text-align: center;
    padding: 40px;
    color: #6b7280;
}
.btn-primary {
    background: #059669;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-primary:hover {
    background: #047857;
}
.btn-secondary {
    background: white;
    color: #1f2937;
    border: 1px solid #e5e7eb;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-secondary:hover {
    background: #f3f4f6;
}
</style>

<!-- HTML do Modal NFE -->
<div class="modal-overlay" id="modal-nfe-overlay" onclick="fecharModalNFE()"></div>
<div class="modal-container" id="modal-nfe-container" style="display:none;">
    <div class="modal-header modal-header-info">
        <div class="modal-header-icon">📄</div>
        <div class="modal-header-title">
            <h3>Confirmar Importação de Nota Fiscal</h3>
            <p>Revise os dados antes de importar</p>
        </div>
        <button class="modal-close" onclick="fecharModalNFE()">✕</button>
    </div>
    <div class="modal-body" id="modal-nfe-body">
        <div class="loading-spinner">⏳ Carregando dados da Nota Fiscal...</div>
    </div>
    <div class="modal-footer">
        <button class="btn-secondary" onclick="fecharModalNFE()">Cancelar</button>
        <button class="btn-primary" id="btn-confirmar-nfe" onclick="confirmarImportacaoNFE()">✅ Confirmar Importação</button>
    </div>
</div>

<script>
// JavaScript do Modal NFE
(function() {
    let dadosNFE = null;
    let arquivoXML = null;

    window.fecharModalNFE = function() {
        const overlay = document.getElementById('modal-nfe-overlay');
        const container = document.getElementById('modal-nfe-container');
        if (overlay) overlay.classList.remove('active');
        if (container) container.style.display = 'none';
        dadosNFE = null;
        arquivoXML = null;
    }

    window.abrirModalNFE = function() {
        const overlay = document.getElementById('modal-nfe-overlay');
        const container = document.getElementById('modal-nfe-container');
        if (overlay) overlay.classList.add('active');
        if (container) container.style.display = 'flex';
    }

    window.visualizarXMLNFE = async function(input) {
        if (!input.files || !input.files[0]) return;
        arquivoXML = input.files[0];
        const formData = new FormData();
        formData.append('xml_file', arquivoXML);
        
        const modalBody = document.getElementById('modal-nfe-body');
        if (modalBody) modalBody.innerHTML = '<div class="loading-spinner">⏳ Analisando XML...</div>';
        window.abrirModalNFE();
        
        try {
            const resp = await fetch('/almoxarifado/visualizar-xml-nfe/', { 
                method: 'POST', 
                headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || '' }, 
                body: formData 
            });
            const data = await resp.json();
            
            if (data.success) {
                dadosNFE = data;
                let itensHtml = '';
                if (data.itens && data.itens.length) {
                    itensHtml = '<div class="itens-lista">';
                    data.itens.forEach(item => { 
                        itensHtml += `<div class="item-nfe-row">
                            <span class="item-nfe-codigo">${escapeHtml(item.codigo)}</span>
                            <span class="item-nfe-nome">${escapeHtml(item.nome)}</span>
                            <span class="item-nfe-qtd">${formatNumber(item.quantidade)}</span>
                        </div>`; 
                    });
                    itensHtml += '</div>';
                }
                let alertasHtml = '';
                if (data.itens_existentes && data.itens_existentes.length) {
                    alertasHtml = '<div class="alert-warning">⚠️ Itens existentes terão quantidades somadas</div>';
                }
                if (modalBody) {
                    modalBody.innerHTML = `<div class="nfe-info-card">
                        <div class="nfe-info-row"><span class="nfe-info-label">📄 Número:</span><span>${escapeHtml(data.numero_nota)}</span></div>
                        <div class="nfe-info-row"><span class="nfe-info-label">🏢 Fornecedor:</span><span>${escapeHtml(data.fornecedor_nome)}</span></div>
                        <div class="nfe-info-row"><span class="nfe-info-label">💰 Valor:</span><span>R$ ${formatNumber(data.valor_total)}</span></div>
                    </div>${alertasHtml}${itensHtml}`;
                }
            } else { 
                window.fecharModalNFE(); 
                mostrarToast('Erro: ' + data.error, 'error'); 
            }
        } catch(e) { 
            window.fecharModalNFE(); 
            mostrarToast('Erro ao processar XML', 'error'); 
        }
        input.value = '';
    }

    window.confirmarImportacaoNFE = async function() {
        if (!dadosNFE || !arquivoXML) { 
            mostrarToast('Nenhum dado para importar', 'error'); 
            window.fecharModalNFE(); 
            return; 
        }
        
        const btnConfirmar = document.getElementById('btn-confirmar-nfe');
        const modalBody = document.getElementById('modal-nfe-body');
        
        if (btnConfirmar) {
            btnConfirmar.disabled = true;
            btnConfirmar.textContent = '⏳ Importando...';
        }
        if (modalBody) modalBody.innerHTML = '<div class="loading-spinner">🔄 Importando...</div>';
        
        try {
            const formData = new FormData();
            formData.append('xml_file', arquivoXML);
            const resp = await fetch('/almoxarifado/importar-xml-nfe/', { 
                method: 'POST', 
                headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || '' }, 
                body: formData 
            });
            const data = await resp.json();
            
            window.fecharModalNFE();
            
            if (data.success) { 
                mostrarToast('✅ ' + data.message, 'success'); 
                setTimeout(() => { 
                    if (typeof atualizarTabela === 'function') atualizarTabela(); 
                    location.reload(); 
                }, 1500); 
            } else { 
                mostrarToast('❌ ' + data.error, 'error'); 
            }
        } catch(e) { 
            window.fecharModalNFE(); 
            mostrarToast('Erro na importação', 'error'); 
        }
        
        if (btnConfirmar) {
            btnConfirmar.disabled = false;
            btnConfirmar.textContent = '✅ Confirmar Importação';
        }
        arquivoXML = null;
        dadosNFE = null;
    }

    // Funções auxiliares
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatNumber(num) {
        if (num === undefined) return '0';
        let n = parseFloat(num);
        if (isNaN(n)) return '0';
        return n.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 3 });
    }

    function mostrarToast(msg, tipo) {
        const toast = document.getElementById('toast');
        if (toast) {
            toast.textContent = msg;
            toast.className = 'toast-modern ' + tipo;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        } else {
            alert(msg);
        }
    }
})();
</script>
