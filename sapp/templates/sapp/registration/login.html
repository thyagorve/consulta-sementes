{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Infinity Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* ========== FUNDO DA PÁGINA DE LOGIN ========== */
        .login-page {
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 30%, #f0fdf4 60%, #ecfdf5 100%);
            position: relative;
            overflow: hidden;
            padding: 15px;
        }
        
        /* Partículas decorativas no fundo */
        .login-page::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.1) 0%, transparent 70%);
            top: -80px;
            right: -80px;
            border-radius: 50%;
            animation: floatBubble 8s ease-in-out infinite;
        }
        
        .login-page::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.08) 0%, transparent 70%);
            bottom: -60px;
            left: -60px;
            border-radius: 50%;
            animation: floatBubble 10s ease-in-out infinite reverse;
        }
        
        @keyframes floatBubble {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(15px, -15px) scale(1.03); }
            66% { transform: translate(-10px, 10px) scale(0.98); }
        }
        
        /* Grid decorativo no fundo */
        .login-page .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(34, 197, 94, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 197, 94, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        /* ========== CONTAINER DO CARD ========== */
        .login-card-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
        }
        
        /* ========== LOGO ========== */
        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .login-logo img {
            max-width: 140px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 6px 12px rgba(34, 197, 94, 0.12));
        }
        
        /* ========== CARD DE LOGIN ========== */
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 18px;
            padding: 25px 22px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05);
        }
        
        .login-card .card-title {
            color: #166534;
            font-weight: 600;
            font-size: 1.15rem;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .login-card .card-title i {
            color: #22c55e;
            margin-right: 5px;
        }
        
        /* ========== LABELS ========== */
        .login-card .form-label {
            color: #15803d;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .login-card .form-label i {
            font-size: 0.85rem;
            color: #22c55e;
        }
        
        /* ========== INPUTS ========== */
        .login-card .form-control {
            background: #f0fdf4;
            border: 2px solid rgba(34, 197, 94, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            color: #166534;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .login-card .form-control::placeholder {
            color: rgba(21, 128, 61, 0.35);
            font-size: 0.9rem;
        }
        
        .login-card .form-control:focus {
            background: #ffffff;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
            outline: none;
        }
        
        /* ========== BOTÃO DE LOGIN ========== */
        .login-card .btn-login {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: none;
            border-radius: 10px;
            padding: 11px;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        
        .login-card .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }
        
        .login-card .btn-login:active {
            transform: translateY(0);
        }
        
        /* ========== ALERTAS ========== */
        .login-card .alert {
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.82rem;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 15px;
        }
        
        .login-card .alert-danger {
            background: rgba(239, 68, 68, 0.08);
            color: #dc2626;
            border-left: 3px solid #ef4444;
        }
        
        .login-card .alert-warning {
            background: rgba(245, 158, 11, 0.08);
            color: #d97706;
            border-left: 3px solid #f59e0b;
        }
        
        .login-card .alert-info {
            background: rgba(34, 197, 94, 0.08);
            color: #15803d;
            border-left: 3px solid #22c55e;
        }
        
        .login-card .alert i {
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        /* ========== AVISO CSRF ========== */
        .csrf-notice {
            text-align: center;
            margin-top: 12px;
            color: rgba(21, 128, 61, 0.35);
            font-size: 0.65rem;
        }
        
        .csrf-notice i {
            font-size: 0.6rem;
            color: #22c55e;
        }
        
        /* ========== MOBILE ========== */
        @media (max-width: 480px) {
            .login-page {
                padding: 12px;
                align-items: flex-start;
                padding-top: 40px;
            }
            
            .login-card-wrapper {
                max-width: 100%;
            }
            
            .login-logo {
                margin-bottom: 15px;
            }
            
            .login-logo img {
                max-width: 120px;
            }
            
            .login-card {
                padding: 20px 16px;
                border-radius: 16px;
            }
            
            .login-card .card-title {
                font-size: 1.05rem;
                margin-bottom: 15px;
            }
            
            .login-card .form-control {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
            
            .login-card .btn-login {
                padding: 10px;
                font-size: 0.9rem;
            }
        }
        
        /* ========== TELAS MUITO PEQUENAS ========== */
        @media (max-width: 360px) {
            .login-page {
                padding: 10px;
                padding-top: 25px;
            }
            
            .login-logo img {
                max-width: 100px;
            }
            
            .login-card {
                padding: 16px 14px;
                border-radius: 14px;
            }
            
            .login-card .card-title {
                font-size: 1rem;
                margin-bottom: 12px;
            }
            
            .login-card .form-label {
                font-size: 0.72rem;
            }
            
            .login-card .form-control {
                padding: 8px 10px;
                font-size: 0.85rem;
            }
            
            .login-card .btn-login {
                padding: 9px;
                font-size: 0.85rem;
            }
        }
        
        /* ========== TELAS PEQUENAS EM ALTURA ========== */
        @media (max-height: 650px) {
            .login-page {
                align-items: center;
                padding-top: 15px;
            }
            
            .login-logo {
                margin-bottom: 10px;
            }
            
            .login-logo img {
                max-width: 100px;
            }
            
            .login-card {
                padding: 15px 18px;
            }
            
            .login-card .card-title {
                margin-bottom: 10px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <!-- Grid decorativo de fundo -->
        <div class="grid-bg"></div>
        
        <div class="login-card-wrapper">
            <!-- Logo Infinity Stock -->
            <div class="login-logo">
                <img src="{% static 'img/logo.png' %}" alt="Infinity Stock">
            </div> 
            
            <!-- Card de Login -->
            <div class="login-card">
                <h4 class="card-title">
                    <i class="bi bi-shield-lock-fill"></i> Acessar o Sistema
                </h4>
                
                <!-- Exibe erros do formulário -->
                {% if form.errors %}
                    <div class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <span>Usuário ou senha inválidos</span>
                    </div>
                {% endif %}

                <!-- Exibe mensagens de redirecionamento -->
                {% if next %}
                    {% if user.is_authenticated %}
                        <div class="alert alert-warning" role="alert">
                            <i class="bi bi-lock-fill"></i>
                            <span>Acesso não autorizado</span>
                        </div>
                    {% else %}
                        <div class="alert alert-info" role="alert">
                            <i class="bi bi-info-circle-fill"></i>
                            <span>Faça login para continuar</span>
                        </div>
                    {% endif %}
                {% endif %}

                <form method="post" action="{% url 'sapp:login' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">
                            <i class="bi bi-person-fill"></i> Nome de Usuário
                        </label>
                        <input 
                            type="text" 
                            name="username" 
                            autofocus 
                            autocapitalize="none" 
                            autocomplete="username" 
                            maxlength="150" 
                            class="form-control" 
                            required 
                            id="id_username"
                            placeholder="Digite seu usuário"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="id_password" class="form-label">
                            <i class="bi bi-key-fill"></i> Senha
                        </label>
                        <input 
                            type="password" 
                            name="password" 
                            autocomplete="current-password" 
                            class="form-control" 
                            required 
                            id="id_password"
                            placeholder="Digite sua senha"
                        >
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-login">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Aviso sutil -->
            <div class="csrf-notice">
                <i class="bi bi-shield-check"></i> Conexão segura • Infinity Stock
            </div>
        </div>
    </div>
</body>
</html>
