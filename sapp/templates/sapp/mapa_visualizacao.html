{% extends 'sapp/base.html' %}
{% load static %}

{% block content %}
<div class="main-wrapper d-flex flex-column" style="height: 100vh; height: -webkit-fill-available; background-color: #0f172a; overflow: hidden;">
    
    <!-- BARRA DE CONTROLE ÚNICA LINHA -->
    <nav class="navbar navbar-dark bg-glass p-2 px-3 border-bottom border-secondary border-opacity-25 flex-shrink-0">
        <div class="container-fluid d-flex align-items-center justify-content-between flex-nowrap gap-2">
            
            <!-- 1. IDENTIFICAÇÃO E STATUS -->
            <div class="d-flex align-items-center gap-2 overflow-hidden">
                <div class="d-flex align-items-center flex-wrap gap-2">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-warehouse text-warning me-1 fs-6"></i>
                        <h6 class="mb-0 fw-bold text-white">{{ armazem.nome }}</h6>
                    </div>
                    
                    <div class="d-flex align-items-center gap-1">
                        <span class="badge bg-dark border border-secondary text-info px-2 py-1 small" id="statsTotal" title="Total de Posições">
                            <i class="fas fa-cubes me-1"></i>0
                        </span>
                        <span class="badge bg-dark border border-secondary text-success px-2 py-1 small" id="statsOcupados" title="Posições com Estoque">
                            <i class="fas fa-check-circle me-1"></i>0
                        </span>
                        <span class="badge bg-dark border border-warning text-warning px-2 py-1 small" id="statsUltimosLotes" title="Posições Marcadas (Linha Finalizada)">
                            <i class="fas fa-flag-checkered me-1"></i>0
                        </span>
                    </div>
                </div>

                <div class="input-group input-group-sm d-none d-md-flex" style="width: 220px;">
                    <label class="input-group-text bg-transparent border-secondary text-white-50">
                        <i class="fas fa-exchange-alt"></i>
                    </label>
                    <select class="form-select fw-bold bg-dark text-white border-secondary" id="selectAZ" 
                            onchange="location.href='/mapa-armazem/'+this.value+'/'">
                        {% for az in armazens_disponiveis %}
                            <option value="{{ az.numero }}" {% if az.numero == armazem.numero %}selected{% endif %}>
                                {{ az.nome }} (AZ {{ az.numero }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- 2. BUSCA CENTRAL -->
            <div class="flex-grow-1 mx-2 mx-md-4" style="max-width: 600px;">
                <div class="search-container position-relative">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="campoPesquisaLote" class="search-input" placeholder="Lote, Cliente ou Endereço...">
                    
                    <div id="wrapperContador" class="contador-badge d-none">
                        <span id="resultadosContador">0</span>
                    </div>
                    
                    <button id="btnLimparPesquisa" class="clear-search-btn" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- 3. BOTÕES DE AÇÃO -->
            <div class="d-flex align-items-center gap-1 gap-md-2 flex-shrink-0">
                <a href="{% url 'sapp:lista_armazens' %}" class="btn btn-icon text-info" title="Ver todos os mapas">
                    <i class="fas fa-th-large"></i>
                </a>

                <button onclick="location.reload()" class="btn btn-icon text-white" title="Atualizar">
                    <i class="fas fa-sync-alt"></i>
                </button>
                
                {% if is_admin %}
                <a href="/editor-mapa/{{ armazem.numero }}/" class="btn btn-warning btn-sm fw-bold px-3 d-flex align-items-center gap-1 shadow-sm rounded-3">
                    <i class="fas fa-edit"></i> <span class="d-none d-md-inline">EDITOR</span>
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- AREA DO MAPA -->
    <main class="map-viewport position-relative overflow-auto p-2 p-md-4 d-flex align-items-start justify-content-center">
        <!-- Overlay de Rotação Celular -->
        <div id="landscapeSuggestion" class="orientation-overlay">
            <div class="text-center p-4 rounded-4 bg-dark shadow-lg border border-primary">
                <i class="fas fa-mobile-alt fa-3x mb-3 text-primary rotate-icon"></i>
                <h5 class="text-white">Gire o celular</h5>
                <p class="text-secondary small">Para melhor visualização, use o modo paisagem.</p>
                <button class="btn btn-primary btn-sm" onclick="this.parentElement.parentElement.style.display='none'">Entendi</button>
            </div>
        </div>

        <div id="canvasWrapper" class="position-relative">
            <div id="canvasContainer" class="position-relative shadow-2xl bg-white rounded-3 overflow-hidden">
                <canvas id="mapaCanvas"></canvas>
                <div id="tooltipMapa" class="tooltip-premium"></div>
            </div>
        </div>
    </main>
</div>

<!-- Modal para Multiplos Lotes -->
<div class="modal fade" id="modalMultiplosLotes" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow bg-dark text-white rounded-4 overflow-hidden">
            <div class="modal-header border-bottom border-secondary p-3">
                <h6 class="modal-title fw-bold" id="modalEnderecoTitulo">Endereço</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div id="listaLotesModal" class="list-group list-group-flush" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }

    .bg-glass { background: rgba(15, 23, 42, 0.85) !important; backdrop-filter: blur(10px); }

    .search-container {
        height: 40px; background: rgba(255, 255, 255, 0.08);
        border-radius: 12px; transition: all 0.3s;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .search-container:focus-within {
        background: rgba(255, 255, 255, 1);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.4);
    }

    .search-icon {
        position: absolute; left: 14px; top: 50%;
        transform: translateY(-50%); color: rgba(255, 255, 255, 0.4);
    }

    .search-container:focus-within .search-icon { color: #6366f1; }

    .search-input {
        width: 100%; height: 100%; background: transparent; border: none;
        padding-left: 42px; padding-right: 90px; color: #fff; font-weight: 500;
    }

    .search-input:focus { outline: none; color: #1e293b; }

    .clear-search-btn {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        background: transparent; border: none; color: #ef4444; z-index: 10;
    }

    .contador-badge {
        position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
        background: #fbbf24; color: #000; padding: 2px 8px; border-radius: 6px;
        font-size: 0.7rem; font-weight: 800;
    }

    .orientation-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8);
        z-index: 9999; display: none; align-items: center; justify-content: center;
    }

    @media (max-width: 992px) and (orientation: portrait) { .orientation-overlay { display: flex; } }

    .map-viewport { background-color: #0f172a; flex-grow: 1; }

    #mapaCanvas { cursor: crosshair; image-rendering: -webkit-optimize-contrast; }

    .tooltip-premium {
        position: fixed; display: none; background: white; border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3); min-width: 250px;
        z-index: 1000; overflow: hidden; pointer-events: none;
    }

    .btn-icon {
        width: 38px; height: 38px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05);
    }
    .btn-icon:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

    /* Zoom e Controles */
    .map-controls {
        position: fixed; bottom: 20px; right: 20px;
        z-index: 1000; display: flex; flex-direction: column; gap: 8px;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // ========== CONFIGURAÇÃO E DADOS ==========
    const LAYOUT_ELEMENTS = {{ elementos_json|safe }};
    const STOCK_DATA = {{ dados_ocupacao_json|safe }};
    
    const canvas = document.getElementById('mapaCanvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltipMapa');
    const bsModal = new bootstrap.Modal(document.getElementById('modalMultiplosLotes'));
    
    const CANVAS_WIDTH = {{ armazem.largura_canvas|default:1000 }};
    const CANVAS_HEIGHT = {{ armazem.altura_canvas|default:600 }};
    
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    let estado = {
        termo: '',
        encontrados: new Set(),
        zoomLevel: 1
    };

    let cache = {
        posicoesComEndereco: [],
        posicoesSemEndereco: [],
        dadosPorEndereco: {},
        totalPorEndereco: {},
        indiceBusca: new Map(),
        posicoesComX: {} 
    };

    // ========== INICIALIZAÇÃO DO CACHE ==========
    function inicializarCache() {
        cache.posicoesComEndereco = [];
        cache.posicoesSemEndereco = [];
        cache.dadosPorEndereco = {};
        
        LAYOUT_ELEMENTS.forEach(el => {
            if (el.tipo === 'RETANGULO') {
                const chave = el.id ? el.id.trim().toUpperCase() : '';
                if (chave) {
                    cache.posicoesComEndereco.push({...el, chave});
                } else {
                    cache.posicoesSemEndereco.push(el);
                }
            }
        });

        for (const [endereco, itens] of Object.entries(STOCK_DATA)) {
            const key = endereco.trim().toUpperCase();
            cache.dadosPorEndereco[key] = itens;
            cache.totalPorEndereco[key] = itens.reduce((acc, i) => acc + (parseInt(i.qtd) || 0), 0);
            
            const txtBusca = (itens.map(i => i.lote + ' ' + (i.cliente||'')).join(' ') + ' ' + key).toLowerCase();
            cache.indiceBusca.set(key, { text: txtBusca, multi: itens.length > 1 });
        }
    }

    function carregarStatusX() {
        fetch('/api/marcacoes-ultimo-lote/')
            .then(res => res.json())
            .then(data => {
                cache.posicoesComX = data.marcacoes || {};
                const totalX = Object.keys(cache.posicoesComX).length;
                document.getElementById('statsUltimosLotes').innerHTML = `<i class="fas fa-flag-checkered me-1"></i>${totalX}`;
                desenharMapa();
            }).catch(e => console.error("Erro marcacoes:", e));
    }

    // ========== RENDERIZAÇÃO PRINCIPAL (CORREÇÃO AQUI) ==========
    function desenharMapa() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let ocupadosCount = 0;

        // 1. Posições Estáticas (Decoração)
        cache.posicoesSemEndereco.forEach(pos => {
            ctx.fillStyle = pos.cor || '#f8fafc';
            ctx.fillRect(pos.x, pos.y, pos.w, pos.h);
        });

        // 2. Posições de Armazenagem
        cache.posicoesComEndereco.forEach(pos => {
            const chave = pos.chave;
            const itens = cache.dadosPorEndereco[chave];
            const temEstoque = itens && itens.length > 0;
            const temX = cache.posicoesComX[chave]; // Aqui está o status da linha finalizada
            const ehBusca = estado.termo.length >= 3 && estado.encontrados.has(chave);
            
            if (temEstoque) ocupadosCount++;

            ctx.save();
            
            // Desenhar Retângulo
            if (ehBusca) {
                ctx.fillStyle = '#fbbf24'; // Destaque Amarelo
                ctx.strokeStyle = '#d97706';
            } else if (temEstoque || temX) { 
                // CORREÇÃO: Fica verde se tiver estoque OU se tiver marcação X
                ctx.fillStyle = pos.cor_ocupado || '#10b981';
                ctx.strokeStyle = '#059669';
            } else {
                ctx.fillStyle = pos.cor || '#f1f5f9';
                ctx.strokeStyle = '#cbd5e1';
            }
            
            ctx.lineWidth = 1;
            ctx.fillRect(pos.x, pos.y, pos.w, pos.h);
            ctx.strokeRect(pos.x, pos.y, pos.w, pos.h);

            // Indicador Multi-Lote
            if (temEstoque && cache.indiceBusca.get(chave)?.multi) {
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(pos.x + pos.w - 5, pos.y + 5, 3, 0, Math.PI*2);
                ctx.fill();
            }

            // TEXTO CENTRAL (Prioridade para o X)
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const fontSize = Math.min(pos.h * 0.6, 13);
            ctx.font = `bold ${fontSize}px "Plus Jakarta Sans"`;
            
            if (temX) {
                // DESENHA O X
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 2;
                ctx.fillText('X', pos.x + pos.w/2, pos.y + pos.h/2);
            } else if (temEstoque) {
                // DESENHA QUANTIDADE
                ctx.fillStyle = ehBusca ? '#92400e' : '#ffffff';
                ctx.fillText(cache.totalPorEndereco[chave], pos.x + pos.w/2, pos.y + pos.h/2);
            }

            ctx.restore();
        });

        // 3. Labels de Texto do Mapa
        LAYOUT_ELEMENTS.forEach(el => {
            if (el.tipo === 'TEXTO') {
                ctx.fillStyle = '#64748b';
                ctx.font = '600 11px "Plus Jakarta Sans"';
                ctx.fillText(el.texto, el.x, el.y + 10);
            }
        });

        document.getElementById('statsTotal').innerText = cache.posicoesComEndereco.length;
        document.getElementById('statsOcupados').innerText = ocupadosCount;
    }

    // ========== TOOLTIP DINÂMICO ==========
    canvas.addEventListener('mousemove', function(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        let p = cache.posicoesComEndereco.find(p => x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h);
        
        if (!p) {
            tooltip.style.display = 'none';
            canvas.style.cursor = 'default';
            return;
        }

        const chave = p.chave;
        const itens = cache.dadosPorEndereco[chave] || [];
        const temX = cache.posicoesComX[chave];
        
        let html = `
            <div style="padding:10px; background:${temX ? '#059669' : '#4f46e5'}; color:white; font-weight:bold; font-size:13px;">
                ${chave} ${temX ? '<span class="badge bg-warning text-dark ms-2">LINHA CONCLUÍDA</span>' : ''}
            </div>
            <div style="padding:10px; font-size:12px; color:#334155;">
        `;

        if (itens.length > 0) {
            itens.forEach(it => {
                html += `
                    <div class="mb-2 pb-1 border-bottom">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold text-primary">${it.lote}</span>
                            <span class="badge bg-light text-dark border">${it.qtd} ${it.embalagem||'un'}</span>
                        </div>
                        <div class="small text-muted text-truncate" style="max-width:200px">${it.cliente || 'Sem cliente'}</div>
                    </div>
                `;
            });
        } else {
            html += `<div class="text-center py-2 text-muted">Posição Vazia</div>`;
        }

        html += `</div>`;
        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top = (e.clientY + 15) + 'px';
        canvas.style.cursor = 'pointer';
    });

    // ========== EVENTOS E PESQUISA ==========
    const campoBusca = document.getElementById('campoPesquisaLote');
    campoBusca.addEventListener('input', e => {
        estado.termo = e.target.value.toLowerCase();
        document.getElementById('btnLimparPesquisa').style.display = estado.termo ? 'block' : 'none';
        
        if (estado.termo.length >= 3) {
            estado.encontrados.clear();
            cache.indiceBusca.forEach((v, k) => { if(v.text.includes(estado.termo)) estado.encontrados.add(k); });
            document.getElementById('wrapperContador').classList.remove('d-none');
            document.getElementById('resultadosContador').innerText = estado.encontrados.size;
        } else {
            document.getElementById('wrapperContador').classList.add('d-none');
        }
        desenharMapa();
    });

    document.getElementById('btnLimparPesquisa').onclick = () => {
        campoBusca.value = '';
        campoBusca.dispatchEvent(new Event('input'));
    };

    canvas.addEventListener('dblclick', e => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        const p = cache.posicoesComEndereco.find(p => x >= p.x && x <= p.x + p.w && y >= p.y && y <= p.y + p.h);
        
        if (p) {
            const url = "{% url 'sapp:lista_estoque' %}";
            const itens = cache.dadosPorEndereco[p.chave] || [];
            if (itens.length === 1) {
                window.location.href = `${url}?busca=${itens[0].lote}`;
            } else if (itens.length > 1) {
                document.getElementById('modalEnderecoTitulo').innerText = p.chave;
                const lista = document.getElementById('listaLotesModal');
                lista.innerHTML = itens.map(i => `
                    <a href="${url}?busca=${i.lote}" class="list-group-item list-group-item-action bg-dark text-white border-secondary d-flex justify-content-between">
                        <span>${i.lote}<br><small class="text-muted">${i.cliente||''}</small></span>
                        <span class="badge bg-primary align-self-center">${i.qtd}</span>
                    </a>
                `).join('');
                bsModal.show();
            } else {
                window.location.href = `${url}?busca=${p.chave}`;
            }
        }
    });

    // ========== CONTROLES DE ZOOM ==========
    function aplicarZoom() {
        canvas.style.transform = `scale(${estado.zoomLevel})`;
        canvas.style.transformOrigin = 'top left';
    }

    window.zoomIn = () => { estado.zoomLevel = Math.min(estado.zoomLevel + 0.1, 3); aplicarZoom(); };
    window.zoomOut = () => { estado.zoomLevel = Math.max(estado.zoomLevel - 0.1, 0.5); aplicarZoom(); };
    window.resetZoom = () => { estado.zoomLevel = 1; aplicarZoom(); };

    // Auto-exec
    inicializarCache();
    carregarStatusX();
    setInterval(carregarStatusX, 30000); // Sincroniza a cada 30s

    // Criar botões de zoom dinamicamente
    const controls = document.createElement('div');
    controls.className = 'map-controls d-none d-md-flex';
    controls.innerHTML = `
        <button class="btn btn-primary btn-icon shadow" onclick="zoomIn()"><i class="fas fa-search-plus"></i></button>
        <button class="btn btn-primary btn-icon shadow" onclick="zoomOut()"><i class="fas fa-search-minus"></i></button>
        <button class="btn btn-light btn-icon shadow" onclick="resetZoom()"><i class="fas fa-expand"></i></button>
    `;
    document.querySelector('.map-viewport').appendChild(controls);
});
</script>
{% endblock %}
